services:
  db:
    image: postgres:15-alpine
    container_name: cats_warehouse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: cats_warehouse_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: cats_warehouse_backend
    command: bundle exec rails server -b 0.0.0.0
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      RAILS_ENV: development
      MIGRATE_DB: "true"
      SEED_DB: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    stdin_open: true
    tty: true

volumes:
  postgres_data:
